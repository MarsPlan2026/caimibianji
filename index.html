<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 猜谜游戏编辑器 & 多机制完美叠加版</title>
    <style>
        * {
            box-sizing: border-box;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            margin: 40px auto;
            max-width: 950px;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1 {
            border-bottom: 3px solid #000000;
            padding-bottom: 10px;
            font-size: 2rem;
        }
        .import-zone {
            border: 3px dashed #000000;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            background-color: #fafafa;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .import-zone:hover {
            background-color: #f0f0f0;
        }
        .import-zone p, .import-zone label {
            background: transparent;
        }
        #file-input { display: none; }
        .level-block {
            border: 2px solid #000000;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            background: #fff;
        }
        .level-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed #000000;
            padding-bottom: 5px;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #000000;
            font-size: 1rem;
            outline: none;
            background: #fff;
            color: #000;
        }
        .mechanics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid #000000;
            padding: 15px;
            margin-top: 5px;
            background: #fafafa;
        }
        .mech-item {
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }
        .mech-item input {
            margin-right: 8px;
            margin-top: 4px;
            cursor: pointer;
            accent-color: #000;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #333333; }
        button.delete-btn {
            background-color: #ff4444;
            color: white;
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin: 0;
        }
        button.delete-btn:hover { background-color: #cc0000; }
        .action-bar {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px solid #000000;
        }
        .syntax-tip {
            font-size: 0.85rem;
            color: #555555;
            margin-top: 2px;
        }
        .save-status {
            font-size: 0.9rem;
            color: #00aa00;
            margin-top: 10px;
            min-height: 1.2em;
        }
        .warning { color: #aa5500; }
        .conflict-warning {
            font-size: 0.8rem;
            color: #aa0000;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    
    <h1>😈 猜谜游戏可视化编辑器 (多机制自由堆叠版)</h1>
    
    <div class="import-zone" id="drop-zone">
        <p>📂 <b>将之前生成的成品游戏 (.html) 拖到这里</b> 或者 <b>点击选择文件导入</b></p>
        <span style="font-size: 0.85rem; color: #666; background: transparent;">导入后会自动识别出该关卡当时勾选的所有复合机制</span>
        <input type="file" id="file-input" accept=".html">
    </div>

    <div id="levels-container"></div>

    <button id="add-level-btn">+ 添加新关卡 (Add New Stage)</button>
    <button id="export-json-btn">📥 导出为 JSON 配置</button>
    <button id="import-json-btn">📤 从 JSON 导入</button>
    <div style="display: none;" id="json-file-input">
        <input type="file" id="json-input" accept=".json">
    </div>

    <div class="action-bar">
        <h3>🚀 最终成果产出：</h3>
        <button id="generate-game-btn" style="font-size: 1.2rem; padding: 15px 30px;">一键打包并下载成品游戏 (.html)</button>
        <div id="save-indicator" class="save-status"></div>
    </div>

    <script>
        // ============ 存储与初始化 ============
        const STORAGE_KEY = 'riddle_game_editor_levels_v2';

        let localLevels = loadLevelsFromStorage() || [
            { id: 1, hint: "密码其实是{BLACK}，这关我叠了三种折磨！", answer: "BLACK", mechanics: ["custom-white", "move-input", "backward"] }
        ];

        // 核心机制定义列表 - 【已修复：统一使用全局变量 + 正确事件解绑】
        const mechanicsRegistry = [
            { 
                id: "custom-white", 
                label: "【大括号精准隐形】提示词中 {} 里的字变纯白", 
                sign: "processedHtml = rawText", 
                init: `let rawText = hintEl.textContent; let processedHtml = rawText.replace(/\\{([^}]+)\\}/g, (m,p1)=>\`<span style="color:#fff;background:transparent">\${p1}</span>\`); hintEl.innerHTML = processedHtml;`,
                clear: `hintEl.innerHTML = hintEl.textContent.replace(/[{}]/g, '');`,
            },
            { 
                id: "font-ghost", 
                label: "【隐形墨水】输入框里的字变为纯白色（打字瞎眼）", 
                sign: "style.color = '#ffffff'", 
                init: `inputEl.style.color = '#ffffff'; inputEl.style.caretColor = '#000000';`,
                clear: `inputEl.style.color = '#000000';`,
            },
            { 
                id: "move-input", 
                label: "【瞬移输入框】鼠标一碰输入框就跑路", 
                sign: "inputEl.onmouseenter = ", 
                init: `inputEl._origPos = {pos:inputEl.style.position, left:inputEl.style.left, top:inputEl.style.top}; inputEl.onmouseenter = () => { inputEl.style.position='fixed'; inputEl.style.left=Math.random()*(window.innerWidth-250)+'px'; inputEl.style.top=Math.random()*(window.innerHeight-50)+'px'; };`,
                clear: `inputEl.onmouseenter = null; if(inputEl._origPos){ inputEl.style.position=inputEl._origPos.pos; inputEl.style.left=inputEl._origPos.left; inputEl.style.top=inputEl._origPos.top; delete inputEl._origPos; }`,
            },
            { 
                id: "uppercase", 
                label: "【大写锁定】强制玩家输入的字母全部变成大写", 
                sign: "toUpperCase()", 
                init: `inputEl._upperHandler = function(){ this.value = this.value.toUpperCase(); }; inputEl.addEventListener('input', inputEl._upperHandler);`,
                clear: `if(inputEl._upperHandler){ inputEl.removeEventListener('input', inputEl._upperHandler); delete inputEl._upperHandler; }`,
            },
            { 
                id: "backward", 
                label: "【反向恶作剧】打字时文字从后往前倒序显示", 
                sign: "reverse().join('')", 
                init: `inputEl._backHandler = function(e){ if(e.inputType!=='deleteContentBackward'){ this.value = this.value.split('').reverse().join(''); } }; inputEl.addEventListener('input', inputEl._backHandler);`,
                clear: `if(inputEl._backHandler){ inputEl.removeEventListener('input', inputEl._backHandler); delete inputEl._backHandler; }`,
            },
            { 
                id: "ghost", 
                label: "【灵异干扰】每隔0.2秒自动往框里塞一个随机数", 
                sign: "ghostTimer =", 
                init: `inputEl._ghostTimer = setInterval(()=>{ inputEl.value += Math.floor(Math.random()*10); }, 200);`,
                clear: `if(inputEl._ghostTimer){ clearInterval(inputEl._ghostTimer); delete inputEl._ghostTimer; }`,
            },
            { 
                id: "mousemove", 
                label: "【绝对静止】只要鼠标在页面晃动就清空输入框", 
                sign: "window._onMouseMoveRiddle =", 
                init: `window._onMouseMoveRiddle = ()=>{ inputEl.value=''; }; window.addEventListener('mousemove', window._onMouseMoveRiddle);`,
                clear: `if(window._onMouseMoveRiddle){ window.removeEventListener('mousemove', window._onMouseMoveRiddle); delete window._onMouseMoveRiddle; }`,
            },
            { 
                id: "btn-wipe", 
                label: "【痛击提交】鼠标一摸SUBMIT按钮就秒清输入框", 
                sign: "submitBtn.onmouseenter =", 
                init: `submitBtn.onmouseenter = ()=>{ inputEl.value=''; };`,
                clear: `submitBtn.onmouseenter = null;`,
            },
            { 
                id: "upside-down", 
                label: "【天翻地覆】整个页面每3秒颠倒旋转180度", 
                sign: "rotationTimer =", 
                init: `document.body.style.transition='transform .5s'; document.body._rotState=0; document.body._rotTimer=setInterval(()=>{ document.body._rotState=document.body._rotState===0?180:0; document.body.style.transform=\`rotate(\${document.body._rotState}deg)\`; },3000);`,
                clear: `if(document.body._rotTimer){ clearInterval(document.body._rotTimer); delete document.body._rotTimer; } document.body.style.transform='rotate(0deg)';`,
            },
            { 
                id: "shrink", 
                label: "【空间压迫】只要回答错误，输入框就会变窄一截", 
                sign: "_shrinkHandler =", 
                init: `inputEl._shrinkW=250; inputEl._shrinkHandler=()=>{ inputEl._shrinkW=Math.max(50,inputEl._shrinkW-30); inputEl.style.width=inputEl._shrinkW+'px'; }; window.addEventListener('shrink-fail', inputEl._shrinkHandler);`,
                clear: `if(inputEl._shrinkHandler){ window.removeEventListener('shrink-fail', inputEl._shrinkHandler); delete inputEl._shrinkHandler; } inputEl.style.width='250px';`,
            },
            { 
                id: "move-btn", 
                label: "【闪避按钮】提交按钮满屏幕乱飞飞", 
                sign: "submitBtn.onmouseenter =", 
                init: `submitBtn.style.position='fixed'; submitBtn._origPos={left:submitBtn.style.left,top:submitBtn.style.top}; submitBtn.onmouseenter=()=>{ submitBtn.style.left=Math.random()*(window.innerWidth-100)+'px'; submitBtn.style.top=Math.random()*(window.innerHeight-50)+'px'; };`,
                clear: `submitBtn.onmouseenter=null; if(submitBtn._origPos){ submitBtn.style.position='static'; submitBtn.style.left=submitBtn._origPos.left; submitBtn.style.top=submitBtn._origPos.top; delete submitBtn._origPos; }`,
            },
        ];

        const container = document.getElementById('levels-container');

        // ============ 本地存储功能 ============
        function saveLevelsToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(localLevels));
                showSaveStatus('✅ 已自动保存到浏览器');
            } catch(e) {
                console.warn('存储失败:', e);
                showSaveStatus('⚠️ 存储失败，请检查浏览器设置');
            }
        }

        function loadLevelsFromStorage() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : null;
            } catch(e) {
                console.warn('读取存储失败:', e);
                return null;
            }
        }

        function showSaveStatus(message) {
            const indicator = document.getElementById('save-indicator');
            indicator.innerText = message;
            indicator.className = 'save-status ' + (message.includes('⚠️') ? 'warning' : '');
            setTimeout(() => { indicator.innerText = ''; indicator.className = 'save-status'; }, 3000);
        }

        // ============ 渲染和编辑 ============
        function render() {
            container.innerHTML = "";
            localLevels.forEach((level, index) => {
                const block = document.createElement('div');
                block.className = 'level-block';
                
                let checkboxesHtml = "";
                mechanicsRegistry.forEach(mech => {
                    const isChecked = level.mechanics.includes(mech.id) ? "checked" : "";
                    checkboxesHtml += `
                        <label class="mech-item">
                            <input type="checkbox" data-mech-id="${mech.id}" ${isChecked} onchange="toggleMechanic(${index}, '${mech.id}', this.checked)">
                            ${mech.label}
                        </label>
                    `;
                });

                // 机制冲突检测提示
                let conflictWarning = '';
                const hasMoveInput = level.mechanics.includes('move-input');
                const hasMoveBtn = level.mechanics.includes('move-btn');
                if (hasMoveInput && hasMoveBtn) {
                    conflictWarning = '<div class="conflict-warning" style="display:block">⚠️ 注意：同时启用【瞬移输入框】和【闪避按钮】可能导致操作困难</div>';
                }

                block.innerHTML = `
                    <button class="delete-btn" onclick="deleteLevel(${index})">X 删除此关</button>
                    <div class="level-title">STAGE ${String(level.id).padStart(2, '0')} 配置卡片</div>
                    <div class="form-group">
                        <label>关卡显示ID:</label>
                        <input type="text" value="${escapeHtml(level.id)}" onchange="updateLevel(${index}, 'id', this.value)">
                    </div>
                    <div class="form-group">
                        <label>给玩家的提示信息 (Hint):</label>
                        <input type="text" value="${escapeHtml(level.hint)}" onchange="updateLevel(${index}, 'hint', this.value)">
                        <div class="syntax-tip">💡 提示：用 {} 包裹的内容在游戏里会变成纯白隐形，如：这是{隐形文本}</div>
                    </div>
                    <div class="form-group">
                        <label>真正的未加密答案 (Answer):</label>
                        <input type="text" value="${escapeHtml(level.answer)}" onchange="updateLevel(${index}, 'answer', this.value)">
                    </div>
                    <div class="form-group">
                        <label>赋予本关的折磨机制 (可勾选多个同时生效):</label>
                        <div class="mechanics-grid">${checkboxesHtml}</div>
                        ${conflictWarning}
                    </div>
                `;
                container.appendChild(block);
            });
        }

        function updateLevel(index, key, value) {
            if(index >= 0 && index < localLevels.length) {
                localLevels[index][key] = value;
                saveLevelsToStorage();
            }
        }

        function toggleMechanic(levelIndex, mechId, isChecked) {
            if(levelIndex < 0 || levelIndex >= localLevels.length) return;
            let mechs = localLevels[levelIndex].mechanics;
            if (isChecked) {
                if (!mechs.includes(mechId)) mechs.push(mechId);
            } else {
                localLevels[levelIndex].mechanics = mechs.filter(id => id !== mechId);
            }
            saveLevelsToStorage();
            render(); // 重新渲染以更新冲突提示
        }

        function deleteLevel(index) {
            if(confirm('确定要删除这一关吗？')) {
                localLevels.splice(index, 1);
                saveLevelsToStorage();
                render();
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        document.getElementById('add-level-btn').onclick = () => {
            let nextId = localLevels.length > 0 ? parseInt(localLevels[localLevels.length - 1].id) + 1 : 1;
            localLevels.push({ id: nextId, hint: "请输入答案", answer: "PASS", mechanics: [] });
            saveLevelsToStorage();
            render();
        };

        // ============ JSON 导入导出 ============
        document.getElementById('export-json-btn').onclick = () => {
            const jsonStr = JSON.stringify(localLevels, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `riddle_game_config_${Date.now()}.json`;
            link.click();
            showSaveStatus('📥 配置已导出为 JSON');
        };

        document.getElementById('import-json-btn').onclick = () => {
            document.getElementById('json-input').click();
        };

        document.getElementById('json-input').onchange = (e) => {
            if(e.target.files.length > 0) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(Array.isArray(data) && data.length > 0 && data[0]?.hasOwnProperty('id')) {
                            localLevels = data;
                            saveLevelsToStorage();
                            render();
                            alert(`✅ 成功导入 ${data.length} 个关卡配置！`);
                        } else {
                            alert('❌ JSON 格式错误，需要是关卡数组');
                        }
                    } catch(err) {
                        alert('❌ JSON 解析失败：' + err.message);
                    }
                };
                reader.readAsText(e.target.files[0]);
            }
        };

        // ============ 反向回导解析 ============
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#000'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#000000'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#000000';
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const htmlContent = event.target.result;
                try {
                    const match = htmlContent.match(/const\s+levels\s*=\s*\[([\s\S]*?)\]\s*;/);
                    if (!match) {
                        alert("❌ 解析失败：格式不匹配！请确保导入的是由本编辑器生成的 .html 游戏文件");
                        return;
                    }
                    
                    const rawLevelsText = match[1];
                    const levelBlocks = rawLevelsText.split(/\}\s*,\s*\{/);
                    let importedLevels = [];
                    
                    levelBlocks.forEach((block) => {
                        let cleanBlock = block.replace(/^[\s{]*/, '').replace(/[\s}]*$/, '');
                        
                        let idMatch = cleanBlock.match(/id:\s*(\d+)/);
                        let hintMatch = cleanBlock.match(/hint:\s*["']([\s\S]*?)["']\s*,/);
                        let tokenMatch = cleanBlock.match(/answerToken:\s*["']([\s\S]*?)["']\s*,/);
                        
                        if (idMatch && hintMatch && tokenMatch) {
                            try {
                                let id = idMatch[1];
                                let hint = hintMatch[1];
                                let answer = atob(tokenMatch[1].trim());
                                
                                let activeMechs = [];
                                mechanicsRegistry.forEach(m => {
                                    if (cleanBlock.includes(m.sign) || cleanBlock.includes(`"${m.id}"`)) {
                                        activeMechs.push(m.id);
                                    }
                                });
                                
                                importedLevels.push({ id, hint, answer, mechanics: activeMechs });
                            } catch(e) {
                                console.warn('解析关卡失败:', e);
                            }
                        }
                    });

                    if (importedLevels.length > 0) {
                        localLevels = importedLevels;
                        saveLevelsToStorage();
                        render();
                        alert(`🎉 还原成功！已恢复共 ${importedLevels.length} 个关卡和机制配置。`);
                    } else {
                        alert('❌ 未能解析出任何关卡数据');
                    }
                } catch(err) {
                    alert("❌ 导入解析出错：" + err.message);
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        // ============ 多套机制代码打包（核心修复版） ============
        document.getElementById('generate-game-btn').onclick = () => {
            if(localLevels.length === 0) {
                alert("你总得先添加一关才能打包吧！");
                return;
            }

            let levelsArrayCode = "const levels = [\n";
            localLevels.forEach((lvl, idx) => {
                let token = btoa(lvl.answer); 
                
                // 构建 init 函数 - 使用全局变量 inputEl/hintEl/submitBtn
                let combinedInit = "function() {\n";
                lvl.mechanics.forEach(mechId => {
                    let target = mechanicsRegistry.find(m => m.id === mechId);
                    if(target) {
                        combinedInit += `                    ${target.init}\n`;
                    }
                });
                combinedInit += "                }";
                
                // 构建 clear 函数
                let combinedClear = "function() {\n";
                lvl.mechanics.forEach(mechId => {
                    let target = mechanicsRegistry.find(m => m.id === mechId);
                    if(target) {
                        combinedClear += `                    ${target.clear}\n`;
                    }
                });
                combinedClear += "                }";

                // 安全转义 hint 中的特殊字符（支持换行、引号、反斜杠等）
                let safeHint = lvl.hint
                    .replace(/\\/g, '\\\\')
                    .replace(/"/g, '\\"')
                    .replace(/\n/g, '\\n')
                    .replace(/\r/g, '\\r');

                levelsArrayCode += `            {\n`;
                levelsArrayCode += `                id: ${lvl.id},\n`;
                levelsArrayCode += `                hint: "${safeHint}",\n`;
                levelsArrayCode += `                answerToken: "${token}",\n`;
                levelsArrayCode += `                init: ${combinedInit},\n`;
                levelsArrayCode += `                clear: ${combinedClear}\n`;
                levelsArrayCode += `            }`;
                if(idx < localLevels.length - 1) levelsArrayCode += ",";
                levelsArrayCode += "\n";
            });
            levelsArrayCode += "        ];";

            const finalHtmlTemplate = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失控的输入框 - 多机制复合破坏版</title>
    <style>
        * { box-sizing: border-box; background-color: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #game-container { width: 80%; max-width: 600px; text-align: center; position: relative; }
        #hint { font-size: 1.5rem; margin-bottom: 40px; line-height: 1.6; letter-spacing: 2px; }
        #input-area { position: relative; height: 100px; }
        input[type="text"] { border: 2px solid #000000; padding: 10px 15px; font-size: 1.2rem; width: 250px; outline: none; text-align: center; transition: all 0.2s; }
        button { border: 2px solid #000000; padding: 10px 25px; font-size: 1.2rem; cursor: pointer; margin-left: 10px; background: #fff; }
        button:hover { background-color: #000000; color: #ffffff; }
        #level-indicator { position: absolute; top: 40px; left: 40px; font-size: 1rem; border-bottom: 1px solid #000000; }
        #dev-door { position: absolute; bottom: 20px; left: 20px; width: 30px; height: 30px; cursor: pointer; opacity: 0; background-color: transparent; }
        ::selection { background: #000000; color: #ffffff; }
    </style>
</head>
<body>
    <div id="level-indicator">STAGE: 01</div>
    <div id="game-container">
        <div id="hint">加载中...</div>
        <div id="input-area">
            <input type="text" id="answer-input" autocomplete="off" placeholder="在此处输入...">
            <button id="submit-btn">SUBMIT</button>
        </div>
    </div>
    <div id="dev-door" title="作者后门"></div>

    <script>
        ${levelsArrayCode}

        let currentLevelIndex = 0;
        const hintEl = document.getElementById('hint');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const levelIndicator = document.getElementById('level-indicator');

        // 反调试检测（仅当打开开发者工具并暂停时才会触发加载）
        setInterval(function() {
            const startTime = performance.now(); 
            debugger; 
            const endTime = performance.now();
            if (endTime - startTime > 100) { 
                loadLevel(currentLevelIndex); 
            }
        }, 1000);

        // 禁用右键菜单
        document.oncontextmenu = () => false;

        // 禁用开发者工具快捷键
        window.onkeydown = function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) {
                alert("安全协议锁死。"); 
                return false;
            }
        };

        function loadLevel(index) {
            if (index >= levels.length) {
                hintEl.innerHTML = "恭喜，你用智慧击败了整个网页！";
                inputEl.style.display = 'none'; 
                submitBtn.style.display = 'none';
                levelIndicator.innerText = "END"; 
                return;
            }
            // 清理上一关的机制效果
            if (index > 0) {
                try { levels[index - 1].clear(); } catch(e) { console.warn('清理出错:', e); }
            }
            const currentLevel = levels[index];
            levelIndicator.innerText = "STAGE: " + String(currentLevel.id).padStart(2, '0');
            hintEl.innerHTML = currentLevel.hint;
            inputEl.value = "";
            // 初始化本关机制
            try { currentLevel.init(); } catch(e) { console.warn('初始化出错:', e); }
        }

        function checkAnswer() {
            const currentLevel = levels[currentLevelIndex];
            const userAnswer = inputEl.value;
            const correctAnswer = atob(currentLevel.answerToken);
            
            if (userAnswer === correctAnswer || userAnswer === "SKIP") {
                alert("ACCESS GRANTED.");
                currentLevelIndex++;
                loadLevel(currentLevelIndex);
            } else {
                alert("WRONG ANSWER.");
                // 触发 shrink 机制的失败事件
                window.dispatchEvent(new Event('shrink-fail'));
            }
        }

        // 作者暗门（调试用）
        document.getElementById('dev-door').onclick = function() {
            const target = prompt("【作者暗门】跳到第几关？");
            if (target && !isNaN(target)) {
                currentLevelIndex = Math.max(0, parseInt(target) - 1);
                loadLevel(currentLevelIndex);
            }
        };

        submitBtn.onclick = checkAnswer;
        inputEl.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
        
        // 页面加载完成后初始化第一关
        loadLevel(currentLevelIndex);
    <\/script>
</body>
</html>`;

            const blob = new Blob([finalHtmlTemplate], { type: 'text/html' });
            const link = document.createElement('a');

            link.download = `riddle_game_${Date.now()}.html`;
            link.click();
            showSaveStatus('🎉 游戏已生成并下载！');
        };

        // 初始化
        render();
        showSaveStatus('✅ 编辑器已加载 - 多机制修复版');
    </script>
</body>
