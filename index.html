<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 关卡可视化编辑器 & 多机制完美叠加版</title>
    <style>
        * {
            box-sizing: border-box;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            margin: 40px auto;
            max-width: 950px;
            padding: 0 20px;
            line-height: 1.6;
        }
        h1 {
            border-bottom: 3px solid #000000;
            padding-bottom: 10px;
            font-size: 2rem;
        }
        .import-zone {
            border: 3px dashed #000000;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            background-color: #fafafa;
            cursor: pointer;
        }
        .import-zone:hover {
            background-color: #f0f0f0;
        }
        .import-zone p, .import-zone label {
            background: transparent;
        }
        #file-input {
            display: none;
        }
        .level-block {
            border: 2px solid #000000;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }
        .level-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed #000000;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #000000;
            font-size: 1rem;
            outline: none;
        }
        /* 机制多选框样式 */
        .mechanics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid #000000;
            padding: 15px;
            margin-top: 5px;
        }
        .mech-item {
            display: flex;
            align-items: flex-start;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .mech-item input {
            margin-right: 8px;
            margin-top: 4px;
            cursor: pointer;
        }
        button {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #333333;
        }
        button.delete-btn {
            background-color: #ff4444;
            color: white;
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin: 0;
        }
        button.delete-btn:hover {
            background-color: #cc0000;
        }
        .action-bar {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 3px solid #000000;
        }
        .syntax-tip {
            font-size: 0.85rem;
            color: #555555;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <h1>😈 解谜游戏可视化编辑器 (多机制自由堆叠版)</h1>
    
    <div class="import-zone" id="drop-zone">
        <p>📂 <b>将之前生成的成品游戏 (.html) 拖到这里</b> 或者 <b>点击选择文件导入</b></p>
        <span style="font-size: 0.85rem; color: #666; background: transparent;">导入后会自动识别出该关卡当时勾选的所有复合机制</span>
        <input type="file" id="file-input" accept=".html">
    </div>

    <div id="levels-container">
        <!-- 动态生成的关卡卡片 -->
    </div>

    <button id="add-level-btn">+ 添加新关卡 (Add New Stage)</button>

    <div class="action-bar">
        <h3>🚀 最终成果产出：</h3>
        <button id="generate-game-btn" style="font-size: 1.2rem; padding: 15px 30px;">一键打包并下载成品游戏 (.html)</button>
    </div>

    <script>
        // 初始化关卡，机制现在是一个数组
        let localLevels = [
            { id: 1, hint: "密码其实是{BLACK}，这关我叠了三种折磨！", answer: "BLACK", mechanics: ["custom-white", "move-input", "backward"] }
        ];

        // 核心机制定义列表（特征码用于识别回导）
        const mechanicsRegistry = [
            { id: "custom-white", label: "【大括号精准隐形】提示词中 {} 里的字变纯白", sign: "processedHtml = rawText", init: "const hint = document.getElementById('hint'); let rawText = hint.innerText; let processedHtml = rawText.replace(/\\{([^}]+)\\}/g, \"<span style='color: #ffffff; background: transparent;'>$1</span>\"); hint.innerHTML = processedHtml;", clear: "const hint = document.getElementById('hint'); hint.innerHTML = hint.innerText.replace(/[\\{\\}]/g, '');" },
            { id: "font-ghost", label: "【隐形墨水】输入框里的字变为纯白色（打字瞎眼）", sign: "answer-input').style.color = '#ffffff'", init: "document.getElementById('answer-input').style.color = '#ffffff';", clear: "document.getElementById('answer-input').style.color = '#000000';" },
            { id: "move-input", label: "【瞬移输入框】鼠标一碰输入框就跑路", sign: "input.onmouseenter = () =>", init: "const input = document.getElementById('answer-input'); input.onmouseenter = () => { input.style.position = 'absolute'; input.style.left = Math.random() * 200 - 100 + 'px'; input.style.top = Math.random() * 60 - 30 + 'px'; };", clear: "const input = document.getElementById('answer-input'); input.onmouseenter = null; input.style.position = 'static';" },
            { id: "uppercase", label: "【大写锁定】强制玩家输入的字母全部变成大写", sign: "toUpperCase()", init: "const input = document.getElementById('answer-input'); input.oninput = () => { input.value = input.value.toUpperCase(); };", clear: "document.getElementById('answer-input').oninput = null;" },
            { id: "backward", label: "【反向恶作剧】打字时文字从后往前倒序显示", sign: "reverse().join('')", init: "const input = document.getElementById('answer-input'); input.oninput = (e) => { if (e.inputType !== 'deleteContentBackward') { input.value = input.value.split('').reverse().join(''); } };", clear: "document.getElementById('answer-input').oninput = null;" },
            { id: "ghost", label: "【灵异干扰】每隔0.2秒自动往框里塞一个随机数", sign: "this.ghostTimer =", init: "const input = document.getElementById('answer-input'); this.ghostTimer = setInterval(() => { input.value += Math.floor(Math.random() * 10); }, 200);", clear: "clearInterval(this.ghostTimer);" },
            { id: "mousemove", label: "【绝对静止】只要鼠标在页面晃动就清空输入框", sign: "window.onmousemove =", init: "window.onmousemove = () => { document.getElementById('answer-input').value = ''; };", clear: "window.onmousemove = null;" },
            { id: "btn-wipe", label: "【痛击提交】鼠标一摸SUBMIT按钮就秒清输入框", sign: "submit-btn').onmouseenter =", init: "document.getElementById('submit-btn').onmouseenter = () => { document.getElementById('answer-input').value = ''; };", clear: "document.getElementById('submit-btn').onmouseenter = null;" },
            { id: "upside-down", label: "【天翻地覆】整个页面每隔3秒颠倒旋转180度", sign: "rotate(${deg}deg)", init: "document.body.style.transition = 'transform 0.5s ease'; let deg = 0; this.rotateTimer = setInterval(() => { deg = deg === 0 ? 180 : 0; document.body.style.transform = `rotate(${deg}deg)`; }, 3000);", clear: "clearInterval(this.rotateTimer); document.body.style.transform = 'rotate(0deg)';" },
            { id: "shrink", label: "【空间压迫】只要回答错误，输入框就会变窄一截", sign: "input.style.width =", init: "const input = document.getElementById('answer-input'); const submitBtn = document.getElementById('submit-btn'); submitBtn.onclick = () => { if(input.value !== atob(levels[currentLevelIndex].answerToken)) { input.style.width = (input.offsetWidth - 30) + 'px'; } checkAnswer(); };", clear: "document.getElementById('submit-btn').onclick = checkAnswer; document.getElementById('answer-input').style.width = '250px';" },
            { id: "move-btn", label: "【闪避按钮】提交按钮满屏幕乱飞飞", sign: "btn.onmouseenter =", init: "const btn = document.getElementById('submit-btn'); btn.style.position = 'absolute'; btn.onmouseenter = () => { btn.style.left = Math.random() * (window.innerWidth - 100) + 'px'; btn.style.top = Math.random() * (window.innerHeight - 50) + 'px'; };", clear: "const btn = document.getElementById('submit-btn'); btn.onmouseenter = null; btn.style.position = 'static';" }
        ];

        const container = document.getElementById('levels-container');

        // 渲染可视化界面
        function render() {
            container.innerHTML = "";
            localLevels.forEach((level, index) => {
                const block = document.createElement('div');
                block.className = 'level-block';
                
                // 动态构建复选框网格HTML
                let checkboxesHtml = "";
                mechanicsRegistry.forEach(mech => {
                    const isChecked = level.mechanics.includes(mech.id) ? "checked" : "";
                    checkboxesHtml += `
                        <label class="mech-item">
                            <input type="checkbox" data-mech-id="${mech.id}" ${isChecked} onchange="toggleMechanic(${index}, '${mech.id}', this.checked)">
                            ${mech.label}
                        </label>
                    `;
                });

                block.innerHTML = `
                    <button class="delete-btn" onclick="deleteLevel(${index})">X 删除此关</button>
                    <div class="level-title">STAGE 配置卡片</div>
                    <div class="form-group">
                        <label>关卡显示ID:</label>
                        <input type="text" value="${level.id}" onchange="updateLevel(${index}, 'id', this.value)">
                    </div>
                    <div class="form-group">
                        <label>给玩家的提示信息 (Hint):</label>
                        <input type="text" value="${level.hint}" onchange="updateLevel(${index}, 'hint', this.value)">
                        <div class="syntax-tip">💡 提示：用 {} 包裹的内容在游戏里会变成纯白隐形，如：这是{隐形文本}</div>
                    </div>
                    <div class="form-group">
                        <label>真正的未加密答案 (Answer):</label>
                        <input type="text" value="${level.answer}" onchange="updateLevel(${index}, 'answer', this.value)">
                    </div>
                    <div class="form-group">
                        <label>赋予本关的折磨机制 (可勾选多个同时生效):</label>
                        <div class="mechanics-grid">${checkboxesHtml}</div>
                    </div>
                `;
                container.appendChild(block);
            });
        }

        function updateLevel(index, key, value) {
            localLevels[index][key] = value;
        }

        function toggleMechanic(levelIndex, mechId, isChecked) {
            let mechs = localLevels[levelIndex].mechanics;
            if (isChecked) {
                if (!mechs.includes(mechId)) mechs.push(mechId);
            } else {
                localLevels[levelIndex].mechanics = mechs.filter(id => id !== mechId);
            }
        }

        function deleteLevel(index) {
            localLevels.splice(index, 1);
            render();
        }

        document.getElementById('add-level-btn').onclick = () => {
            let nextId = localLevels.length > 0 ? parseInt(localLevels[localLevels.length - 1].id) + 1 : 1;
            localLevels.push({ id: nextId, hint: "请输入答案", answer: "PASS", mechanics: [] });
            render();
        };

        // --- 核心逻辑 1：反向回导解析复合机制 ---
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => e.preventDefault();
        dropZone.ondrop = (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const htmlContent = event.target.result;
                try {
                    const match = htmlContent.match(/const\s+levels\s*=\s*\[([\s\S]*?)\]\s*;/);
                    if (!match) {
                        alert("解析失败：格式不匹配！");
                        return;
                    }
                    
                    const rawLevelsText = match[1];
                    const levelBlocks = rawLevelsText.split(/\}临?\s*,\s*\{|\},\s*\{/);
                    let importedLevels = [];
                    
                    levelBlocks.forEach(block => {
                        let idMatch = block.match(/id:\s*(\d+)/);
                        let hintMatch = block.match(/hint:\s*["']([\s\S]*?)["']\s*,/);
                        let tokenMatch = block.match(/answerToken:\s*["']([\s\S]*?)["']\s*,/);
                        
                        if (idMatch && hintMatch && tokenMatch) {
                            let id = idMatch[1];
                            let hint = hintMatch[1];
                            let answer = atob(tokenMatch[1].trim());
                            
                            // 检测多选机制：只要块代码包含对应特征码，全部塞进激活数组
                            let activeMechs = [];
                            mechanicsRegistry.forEach(m => {
                                if (block.includes(m.sign)) {
                                    activeMechs.push(m.id);
                                }
                            });
                            
                            importedLevels.push({ id, hint, answer, mechanics: activeMechs });
                        }
                    });

                    if (importedLevels.length > 0) {
                        localLevels = importedLevels;
                        render();
                        alert(`🎉 还原成功！已恢复共 ${importedLevels.length} 个复合关卡。`);
                    }
                } catch(err) {
                    alert("导入解析出错：" + err.message);
                }
            };
            reader.readAsText(file);
        }

        // --- 核心逻辑 2：多套机制代码一键打包串联 ---
        document.getElementById('generate-game-btn').onclick = () => {
            if(localLevels.length === 0) {
                alert("你总得先添加一关才能打包吧！");
                return;
            }

            let levelsArrayCode = "const levels = [\n";
            localLevels.forEach(lvl => {
                let token = btoa(lvl.answer); 
                
                // 将用户勾选的所有机制拼接进同一个 init 和 clear 函数中
                let combinedInit = "function() {\n";
                let combinedClear = "function() {\n";
                
                lvl.mechanics.forEach(mechId => {
                    let target = mechanicsRegistry.find(m => m.id === mechId);
                    if(target) {
                        combinedInit += `                    ${target.init}\n`;
                        combinedClear += `                    ${target.clear}\n`;
                    }
                });
                
                combinedInit += "                }";
                combinedClear += "                }";

                levelsArrayCode += `            {\n                id: ${lvl.id},\n                hint: "${lvl.hint}",\n                answerToken: "${token}",\n                init: ${combinedInit},\n                clear: ${combinedClear}\n            },\n`;
            });
            levelsArrayCode += "        ];";

            const finalHtmlTemplate = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失控的输入框 - 多机制复合破坏版</title>
    <style>
        * { box-sizing: border-box; background-color: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; }
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        #game-container { width: 80%; max-width: 600px; text-align: center; position: relative; }
        #hint { font-size: 1.5rem; margin-bottom: 40px; line-height: 1.6; letter-spacing: 2px; }
        #input-area { position: relative; height: 100px; }
        input[type="text"] { border: 2px solid #000000; padding: 10px 15px; font-size: 1.2rem; width: 250px; outline: none; text-align: center; }
        button { border: 2px solid #000000; padding: 10px 25px; font-size: 1.2rem; cursor: pointer; margin-left: 10px; }
        button:hover { background-color: #000000; color: #ffffff; }
        #level-indicator { position: absolute; top: 40px; left: 40px; font-size: 1rem; border-bottom: 1px solid #000000; }
        #dev-door { position: absolute; bottom: 20px; left: 20px; width: 30px; height: 30px; cursor: pointer; opacity: 0; background-color: transparent; }
        ::selection { background: #000000; color: #ffffff; }
    </style>
</head>
<body>
    <div id="level-indicator">STAGE: 01</div>
    <div id="game-container">
        <div id="hint">加载中...</div>
        <div id="input-area">
            <input type="text" id="answer-input" autocomplete="off" placeholder="在此处输入...">
            <button id="submit-btn">SUBMIT</button>
        </div>
    </div>
    <div id="dev-door" title="作者后门"></div>

    <script>
        ${levelsArrayCode}

        let currentLevelIndex = 0;
        const hintEl = document.getElementById('hint');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const levelIndicator = document.getElementById('level-indicator');

        setInterval(function() {
            const startTime = performance.now(); debugger; const endTime = performance.now();
            if (endTime - startTime > 100) { loadLevel(currentLevelIndex); }
        }, 1000);
        document.oncontextmenu = function() { return false; };
        window.onkeydown = function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.keyCode === 73)) {
                alert("安全协议锁死。"); return false;
            }
        };

        function loadLevel(index) {
            if (index >= levels.length) {
                hintEl.innerHTML = "恭喜，你用智慧击败了整个网页！";
                inputEl.style.display = 'none'; submitBtn.style.display = 'none';
                levelIndicator.innerText = "END"; return;
            }
            if (index > 0) levels[index - 1].clear();
            const currentLevel = levels[index];
            levelIndicator.innerText = "STAGE: " + String(currentLevel.id).padStart(2, '0');
            hintEl.innerHTML = currentLevel.hint;
            inputEl.value = "";
            currentLevel.init();
        }

        function checkAnswer() {
            const currentLevel = levels[currentLevelIndex];
            if (inputEl.value === atob(currentLevel.answerToken) || inputEl.value === "SKIP") {
                alert("ACCESS GRANTED.");
                currentLevelIndex++;
                loadLevel(currentLevelIndex);
            } else {
                alert("WRONG ANSWER.");
            }
        }

        document.getElementById('dev-door').onclick = function() {
            const target = prompt("【作者暗门】跳到第几关？");
            if (target && !isNaN(target)) {
                currentLevelIndex = parseInt(target) - 1;
                loadLevel(currentLevelIndex);
            }
        };

        submitBtn.onclick = checkAnswer;
        inputEl.onkeydown = (e) => { if (e.key === 'Enter') checkAnswer(); };
        loadLevel(currentLevelIndex);
    <\/script>
</body>
</html>`;

            const blob = new Blob([finalHtmlTemplate], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'my_game.html'; 
            link.click();
        };

        render();
    </script>
</body>
</html>
